<svg width="1800" height="980" viewBox="0 0 1800 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B212C"/>
      <stop offset="1" stop-color="#151A23"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10151D"/>
      <stop offset="1" stop-color="#0C1016"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E7EDF7; }
      .subtitle { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3BA; }
      .label { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #94A3BA; }
      .body { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E7EDF7; }
      .detail { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B8C3D6; }
      .tiny { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E7EDF7; }
      .muted { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7E8CA3; }
    </style>
  </defs>

  <rect width="1800" height="980" fill="#0B0F15"/>
  <text x="72" y="72" class="title">Yuru Issue Center Concepts</text>
  <text x="72" y="104" class="subtitle">Three lighter directions for issue visibility before implementation</text>

  <!-- Concept A -->
  <g transform="translate(60 150)">
    <text x="0" y="0" class="title">A. Thin Bottom Strip</text>
    <text x="0" y="30" class="subtitle">Always visible, almost no vertical pressure, list opens upward as a light popover.</text>

    <rect x="0" y="60" width="520" height="760" rx="24" fill="url(#screenBg)" stroke="#293244"/>
    <rect x="0" y="60" width="154" height="760" rx="24" fill="url(#panelBg)" stroke="#293244"/>
    <rect x="154" y="60" width="366" height="760" rx="0" fill="#0F141C"/>
    <rect x="154" y="60" width="366" height="60" fill="#151A23"/>
    <rect x="0" y="60" width="154" height="58" fill="#171D28"/>
    <text x="24" y="96" class="label">Sessions</text>
    <text x="180" y="96" class="label">Terminal / Diff</text>

    <rect x="16" y="132" width="122" height="72" rx="14" fill="#1C2431"/>
    <circle cx="30" cy="154" r="5" fill="#70B7FF"/>
    <text x="44" y="160" class="body" style="font-size:14px">Fix PATH issue</text>
    <text x="24" y="183" class="detail">yuru</text>
    <text x="108" y="183" class="muted">2m ago</text>

    <rect x="16" y="214" width="122" height="72" rx="14" fill="#171D28"/>
    <circle cx="30" cy="236" r="5" fill="#6F8099"/>
    <text x="44" y="242" class="body" style="font-size:14px">Retry worktree</text>
    <text x="24" y="265" class="detail">yuru</text>
    <text x="108" y="265" class="muted">8m ago</text>

    <rect x="176" y="144" width="322" height="548" rx="18" fill="#121823" stroke="#222B3A"/>
    <text x="198" y="178" class="detail">Select a session to resume</text>

    <g transform="translate(174 714)">
      <rect x="0" y="0" width="330" height="54" rx="14" fill="#2A181C" stroke="#704248"/>
      <rect x="12" y="12" width="80" height="30" rx="15" fill="#3B2328"/>
      <text x="27" y="31" class="tiny">2 issues</text>
      <text x="108" y="31" class="body">Codex resume failed. Required command was not found.</text>
      <circle cx="308" cy="27" r="10" fill="#3B2328"/>
      <path d="M304 23L312 31M312 23L304 31" stroke="#F3C1BA" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <g transform="translate(214 534)" filter="url(#shadow)">
      <rect x="0" y="0" width="290" height="168" rx="18" fill="#19131A" stroke="#48323A"/>
      <text x="18" y="28" class="label" style="fill:#F0B5AD">Issues</text>
      <text x="242" y="28" class="tiny" style="fill:#F0B5AD">Clear</text>
      <rect x="18" y="44" width="254" height="48" rx="12" fill="#26191D"/>
      <text x="32" y="64" class="body" style="font-size:14px">Codex resume failed</text>
      <text x="32" y="82" class="detail" style="font-size:12px">Yuru could not find a command needed to launch codex.</text>
      <circle cx="254" cy="68" r="10" fill="#352228"/>
      <path d="M250 64L258 72M258 64L250 72" stroke="#F3C1BA" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="18" y="100" width="254" height="48" rx="12" fill="#21171B"/>
      <text x="32" y="120" class="body" style="font-size:14px">Worktree creation failed</text>
      <text x="32" y="138" class="detail" style="font-size:12px">Git worktree add could not complete.</text>
      <circle cx="254" cy="124" r="10" fill="#352228"/>
      <path d="M250 120L258 128M258 120L250 128" stroke="#F3C1BA" stroke-width="1.6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Concept B -->
  <g transform="translate(640 150)">
    <text x="0" y="0" class="title">B. Floating Issue Pill</text>
    <text x="0" y="30" class="subtitle">Default state is tiny. A compact chip opens a cleaner notification tray from the corner.</text>

    <rect x="0" y="60" width="520" height="760" rx="24" fill="url(#screenBg)" stroke="#293244"/>
    <rect x="0" y="60" width="154" height="760" rx="24" fill="url(#panelBg)" stroke="#293244"/>
    <rect x="154" y="60" width="366" height="760" rx="0" fill="#0F141C"/>
    <rect x="154" y="60" width="366" height="60" fill="#151A23"/>
    <rect x="0" y="60" width="154" height="58" fill="#171D28"/>
    <text x="24" y="96" class="label">Sessions</text>
    <text x="180" y="96" class="label">Terminal / Diff</text>

    <rect x="16" y="132" width="122" height="72" rx="14" fill="#1C2431"/>
    <circle cx="30" cy="154" r="5" fill="#70B7FF"/>
    <text x="44" y="160" class="body" style="font-size:14px">Fix PATH issue</text>
    <text x="24" y="183" class="detail">yuru</text>
    <text x="108" y="183" class="muted">2m ago</text>

    <rect x="176" y="144" width="322" height="548" rx="18" fill="#121823" stroke="#222B3A"/>
    <text x="198" y="178" class="detail">Select a session to resume</text>

    <g transform="translate(392 724)" filter="url(#shadow)">
      <rect x="0" y="0" width="112" height="40" rx="20" fill="#24171B" stroke="#684148"/>
      <circle cx="22" cy="20" r="6" fill="#F08F86"/>
      <text x="36" y="25" class="body" style="font-size:14px">2 issues</text>
      <path d="M92 16L100 24L108 16" stroke="#F3C1BA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(216 454)" filter="url(#shadow)">
      <rect x="0" y="0" width="288" height="250" rx="20" fill="#17131A" stroke="#46323A"/>
      <text x="20" y="30" class="label" style="fill:#F0B5AD">Issue Center</text>
      <rect x="20" y="48" width="248" height="62" rx="14" fill="#22171B"/>
      <text x="36" y="72" class="body" style="font-size:14px">Codex resume failed</text>
      <text x="36" y="92" class="detail" style="font-size:12px">Required command could not be resolved from Yuru.app.</text>
      <text x="226" y="72" class="muted">now</text>
      <circle cx="246" cy="85" r="11" fill="#352228"/>
      <path d="M242 81L250 89M250 81L242 89" stroke="#F3C1BA" stroke-width="1.6" stroke-linecap="round"/>

      <rect x="20" y="120" width="248" height="62" rx="14" fill="#1C1519"/>
      <text x="36" y="144" class="body" style="font-size:14px">Claude start failed</text>
      <text x="36" y="164" class="detail" style="font-size:12px">The process exited before startup finished.</text>
      <text x="226" y="144" class="muted">1m</text>
      <circle cx="246" cy="157" r="11" fill="#352228"/>
      <path d="M242 153L250 161M250 153L242 161" stroke="#F3C1BA" stroke-width="1.6" stroke-linecap="round"/>

      <rect x="20" y="198" width="96" height="34" rx="17" fill="#26191D"/>
      <text x="44" y="220" class="tiny">Clear all</text>
    </g>
  </g>

  <!-- Concept C -->
  <g transform="translate(1220 150)">
    <text x="0" y="0" class="title">C. Header Inbox</text>
    <text x="0" y="30" class="subtitle">Move error awareness out of the footer entirely and treat it like a lightweight app inbox.</text>

    <rect x="0" y="60" width="520" height="760" rx="24" fill="url(#screenBg)" stroke="#293244"/>
    <rect x="0" y="60" width="154" height="760" rx="24" fill="url(#panelBg)" stroke="#293244"/>
    <rect x="154" y="60" width="366" height="760" rx="0" fill="#0F141C"/>
    <rect x="154" y="60" width="366" height="60" fill="#151A23"/>
    <rect x="0" y="60" width="154" height="58" fill="#171D28"/>
    <text x="24" y="96" class="label">Sessions</text>
    <text x="180" y="96" class="label">Terminal / Diff</text>

    <rect x="16" y="132" width="122" height="72" rx="14" fill="#1C2431"/>
    <circle cx="30" cy="154" r="5" fill="#70B7FF"/>
    <text x="44" y="160" class="body" style="font-size:14px">Fix PATH issue</text>
    <text x="24" y="183" class="detail">yuru</text>
    <text x="108" y="183" class="muted">2m ago</text>

    <rect x="176" y="144" width="322" height="548" rx="18" fill="#121823" stroke="#222B3A"/>
    <text x="198" y="178" class="detail">Select a session to resume</text>

    <g transform="translate(402 78)">
      <rect x="0" y="0" width="94" height="26" rx="13" fill="#26181C" stroke="#644048"/>
      <circle cx="16" cy="13" r="4.5" fill="#F08F86"/>
      <text x="28" y="18" class="tiny">2 issues</text>
    </g>

    <g transform="translate(216 112)" filter="url(#shadow)">
      <rect x="0" y="0" width="288" height="188" rx="18" fill="#16131A" stroke="#46323A"/>
      <text x="20" y="30" class="label" style="fill:#F0B5AD">Recent issues</text>
      <rect x="20" y="44" width="248" height="52" rx="12" fill="#22171B"/>
      <text x="34" y="66" class="body" style="font-size:14px">Codex resume failed</text>
      <text x="34" y="84" class="detail" style="font-size:12px">Required command could not be resolved.</text>
      <rect x="20" y="104" width="248" height="52" rx="12" fill="#1D1519"/>
      <text x="34" y="126" class="body" style="font-size:14px">Worktree creation failed</text>
      <text x="34" y="144" class="detail" style="font-size:12px">The process exited before startup finished.</text>
    </g>
  </g>

  <text x="70" y="930" class="label">Recommendation</text>
  <text x="70" y="958" class="subtitle">B is the safest next step: low idle noise, clear affordance, and a natural path to a fuller issue center later.</text>
</svg>
